<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invoice Verification</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f5;
padding:40px;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
color:#2E7D32;
margin-bottom:5px;
}

.subtitle{
color:#777;
margin-bottom:30px;
}

.section{
margin-top:25px;
font-size:16px;
line-height:1.6;
}

.label{
font-weight:bold;
color:#333;
}



/* Container to align buttons side-by-side */
.action-area {
    display: flex;
    flex-direction: row; /* Side-by-side on desktop */
    flex-wrap: wrap;     /* Stack on mobile if needed */
    gap: 15px;
    justify-content: center;
    margin-top: 30px;
}

.btn-3d {
    padding: 14px 25px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    border-radius: 8px;
    font-size: 16px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.1s ease;
}

/* WhatsApp Green 3D */
.whatsapp-btn {
    background: #25D366;
    box-shadow: 0 4px #128C7E;
}

/* Download Blue 3D */
.download-btn {
    background: #1976D2;
    box-shadow: 0 4px #0D47A1;
    display: inline-block;
    margin-top: 25px;

}

/* Press effect for both */
.btn-3d:active {
    box-shadow: 0 1px #128C7E;
    transform: translateY(3px);
}

@media print {
    .action-area { display: none !important; }
}





table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#2E7D32;
color:white;
}

.total{
text-align:right;
font-size:22px;
margin-top:20px;
font-weight:bold;
color:#2E7D32;
}

.notice{
margin-top:40px;
padding:20px;
background:#FFF3CD;
border:1px solid #ffeeba;
font-weight:bold;
text-align:center;
line-height:1.6;
}

.whatsapp-btn{

display:inline-block;
margin-top:25px;
padding:14px 25px;
background:#25D366;
color:white;
text-decoration:none;
font-weight:bold;
border-radius:6px;
font-size:18px;

}

.whatsapp-btn:hover{
background:#1ebe5d;
}

</style>

</head>

<body>

<div class="container">

<h1>Hindustan Beej Bhandar</h1>
<div class="subtitle">Thali Bazar, Near Petrol Pump</div>

<div id="invoiceContent"></div>

</div>

<script>

const data = JSON.parse(localStorage.getItem("hbb_invoice"));

src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"

if(!data){
document.getElementById("invoiceContent").innerHTML="<h2>No invoice data found</h2>";
throw new Error("No invoice");
}

let rows="";
let whatsappItems="";

data.items.forEach(item=>{

let subtotal=item.price*item.quantity;

rows+=`
<tr>
<td>${item.name}</td>
<td>${item.quantity}</td>
<td>₹${item.price}</td>
<td>₹${subtotal}</td>
</tr>
`;

whatsappItems+=`${item.name} x${item.quantity} = ₹${subtotal}%0A`;

});

const whatsappMessage =

`*HINDUSTAN BEEJ BHANDAR ORDER*%0A%0A`+
`Invoice ID: ${data.invoiceId}%0A`+
`Customer: ${data.customerName}%0A`+
`Father Name: ${data.fatherName}%0A`+
`Phone: ${data.phone}%0A%0A`+
`Email: ${data.email}%0A%0A`+

`*ORDER ITEMS*%0A`+
`${whatsappItems}%0A`+

`Grand Total: ₹${data.total}%0A%0A`+

`UTR: ${data.utr}%0A%0A`+

`I have also attached payment screenshot and order screenshot.`;

const whatsappURL = `https://wa.me/919931753119?text=${whatsappMessage}`;

document.getElementById("invoiceContent").innerHTML=`

<div class="section">

<div><span class="label">Invoice ID:</span> ${data.invoiceId}</div>
<div><span class="label">Date:</span> ${data.date}</div>

</div>

<div class="section">

<div><span class="label">Customer Name:</span> ${data.customerName}</div>
<div><span class="label">Father Name:</span> ${data.fatherName}</div>
<div><span class="label">Phone:</span> ${data.phone}</div>
<div><span class="label">Email:</span> ${data.email}</div>

</div>

<div class="section">

<div class="label">Address</div>

${data.address}<br>
${data.district}, ${data.state} - ${data.pincode}

</div>

<div class="section">

<div><span class="label">Payment App:</span> ${data.paymentApp}</div>
<div><span class="label">UTR / Transaction ID:</span> ${data.utr}</div>

</div>

<table>

<tr>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>

${rows}

</table>

<div class="total">

Grand Total : ₹${data.total}

</div>

<div class="notice">

⚠️ IMPORTANT  

1️⃣ Please SCREENSHOT this invoice page  

2️⃣ Also take screenshot of your PAYMENT confirmation  

3️⃣ Send both screenshots on WhatsApp to confirm your order.

</div>

<div class="action-area">
    <a class="btn-3d whatsapp-btn" href="${whatsappURL}" target="_blank">
        📲 Send on WhatsApp
    </a>
    
    <button class="btn-3d download-btn" onclick="window.print()">
        📥 Download Invoice (PDF)
    </button>
</div>

`;
// Add the buttons to your innerHTML
const actionButtons = `
<div class="action-area">
    <button class="btn-3d download-btn" onclick="downloadInvoice()">
        📥 Download Invoice (PDF)
    </button>
    <a class="btn-3d whatsapp-btn" href="${whatsappURL}" target="_blank">
        📲 Send on WhatsApp
    </a>
</div>
`;

// ADD THIS FUNCTION AT THE VERY BOTTOM OF YOUR SCRIPT
function downloadInvoice() {
    const element = document.getElementById('invoiceContent');
    const invoiceId = data ? data.invoiceId : "Invoice";
    
    // Temporarily hide buttons so they don't show up in the PDF
    const actionArea = document.querySelector('.action-area');
    const notice = document.querySelector('.notice');
    actionArea.classList.add('no-print');
    notice.classList.add('no-print');

    const options = {
        margin: 0.5,
        filename: `HBB_Invoice_${invoiceId}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    };

    // New Promise based usage:
    html2pdf().set(options).from(element).save().then(() => {
        // Bring buttons back after downloading
        actionArea.classList.remove('no-print');
        notice.classList.remove('no-print');
    });
}

</script>

</body>
</html>
